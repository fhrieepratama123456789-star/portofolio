<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Elegant</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:white;
    font-size:32px;
    letter-spacing:1px;
    margin-bottom:30px;
    font-weight:700;
}

.container{
    max-width:1100px;
    margin:auto;
}

.form{
    background:rgba(255,255,255,0.95);
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    margin-bottom:30px;
}

.form-group{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group.full{grid-template-columns:1fr}

label{
    font-size:13px;
    font-weight:600;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #ddd;
    transition:.3s;
    font-family:'Poppins',sans-serif;
}

input:focus,textarea:focus{
    border-color:#2a5298;
    box-shadow:0 0 0 3px rgba(42,82,152,.2);
}

button{
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.card-body h3{
    margin:0 0 10px;
    font-size:18px;
    font-weight:600;
}

.card-body p{
    font-size:13px;
    color:#555;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.actions button{
    flex:1;
    padding:8px;
    font-size:12px;
}

.actions button:last-child{background:#ff6b6b}

@media(max-width:600px){
    .form-group{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">
<h1>✨ Portofolio Saya</h1>

<div class="form">
<input type="hidden" id="editIndex">

<div class="form-group">
<div>
<label>Judul Project</label>
<input type="text" id="title">
</div>

<div>
<label>Upload Gambar</label>
<input type="file" id="image">
</div>
</div>

<div class="form-group full">
<div>
<label>Deskripsi</label>
<textarea id="desc"></textarea>
</div>
</div>

<button onclick="saveData()">Simpan Data</button>
</div>

<div class="cards" id="cards"></div>
</div>

<script>
let data=JSON.parse(localStorage.getItem('portfolio'))||[];

function render(){
    const cards=document.getElementById('cards');
    cards.innerHTML='';
    data.forEach((item,index)=>{
        cards.innerHTML+=`
        <div class="card">
            <img src="${item.image}" />
            <div class="card-body">
                <h3>${item.title}</h3>
                <p>${item.desc}</p>
                <div class="actions">
                    <button onclick="editData(${index})">Edit</button>
                    <button onclick="deleteData(${index})">Hapus</button>
                </div>
            </div>
        </div>`;
    });
}

function saveData(){
    const title=document.getElementById('title').value;
    const desc=document.getElementById('desc').value;
    const imageInput=document.getElementById('image');
    const editIndex=document.getElementById('editIndex').value;

    if(!title||!desc)return alert('Isi semua data!');

    if(imageInput.files[0]){
        const reader=new FileReader();
        reader.onload=e=>saveToData(title,desc,e.target.result,editIndex);
        reader.readAsDataURL(imageInput.files[0]);
    }else{
        saveToData(title,desc,data[editIndex]?.image||'',editIndex);
    }
}

function saveToData(title,desc,image,index){
    if(index==='')data.push({title,desc,image});
    else data[index]={title,desc,image};

    localStorage.setItem('portfolio',JSON.stringify(data));
    resetForm();
    render();
}

function editData(i){
    title.value=data[i].title;
    desc.value=data[i].desc;
    editIndex.value=i;
}

function deleteData(i){
    if(confirm('Hapus data ini?')){
        data.splice(i,1);
        localStorage.setItem('portfolio',JSON.stringify(data));
        render();
    }
}

function resetForm(){
    title.value='';
    desc.value='';
    image.value='';
    editIndex.value='';
}

render();
</script>

</body>
</html>
